<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ Accordion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Frequently Asked Questions</h1>

    <!-- Optional Search Bar -->
    <input type="text" id="faqSearch" placeholder="Search FAQs..." aria-label="Search FAQs">

    <!-- FAQ Container -->
    <section id="faqContainer" class="faq-container" aria-label="FAQ Section">
      <!-- FAQs will be dynamically injected here -->
    </section>

    <!-- Optional Expand/Collapse All Buttons -->
    <div class="faq-controls">
      <button id="expandAll">Expand All</button>
      <button id="collapseAll">Collapse All</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
